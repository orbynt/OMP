syntax = "proto3";

package orbynt.memory.protocol.v1;

message CanonicalId {
  string uri = 1;
}

message NamespaceRef {
  string namespace_id = 1;
  string name = 2;
}

message Provenance {
  string source = 1;
  string created_at = 2;
  string updated_at = 3;
  string source_id = 4;
  string source_type = 5;
  string source_label = 6;
  string acquisition_time = 7;
  map<string, string> attributes = 8;
}

message TimeRange {
  string start_time = 1;
  string end_time = 2;
}

message Checksum {
  string algorithm = 1;
  bytes digest = 2;
}

message ExportPolicy {
  bool allow_export = 1;
  repeated string allowed_targets = 2;
  repeated string redacted_tags = 3;
  bool include_embeddings = 4;
  bool include_graph = 5;
  bool include_preferences = 6;
  bool include_private_memories = 7;
}


