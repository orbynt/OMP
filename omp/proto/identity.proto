syntax = "proto3";

package orbynt.memory.protocol.v1;

import "omp/proto/common.proto";

message Preference {
  string key = 1;
  string value = 2;
  float confidence = 3;
  string category = 4;
  Provenance provenance = 5;
}

message PreferenceBundle {
  repeated Preference preferences = 1;
}

message Skill {
  string name = 1;
  string description = 2;
  string level = 3;
  float years_experience = 4;
  repeated string evidence = 5;
  float confidence = 6;
  Provenance provenance = 7;
}

message SkillBundle {
  repeated Skill skills = 1;
}

message Interest {
  string name = 1;
  string description = 2;
  float confidence = 3;
  Provenance provenance = 4;
}

message InterestBundle {
  repeated Interest interests = 1;
}

message IdentityProfile {
  string passport_id = 1;
  string identity_id = 2;
  string display_name = 3;
  string username = 4;
  repeated string aliases = 5;
  string locale = 6;
  string timezone = 7;
  string country = 8;
  string primary_language = 9;
  string namespace_id = 10;
  Provenance provenance = 11;
}


