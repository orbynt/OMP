<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">OMP System Architecture</title>
  <desc id="desc">A diagram showing how a Python app or CLI uses the OMP library to write a portable .orb memory file, and how an AI system reads the .orb file through OMP to produce AI-ready memory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#f5fff8"/>
      <stop offset="100%" stop-color="#fffaf2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-slate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 800 36px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px Arial, sans-serif; fill: #475569; }
      .lane { font: 800 14px Arial, sans-serif; letter-spacing: 1.5px; fill: #64748b; }
      .box-title { font: 800 21px Arial, sans-serif; fill: #0f172a; }
      .box-subtitle { font: 600 14px Arial, sans-serif; fill: #475569; }
      .small { font: 600 13px Arial, sans-serif; fill: #475569; }
      .step { font: 700 14px Arial, sans-serif; fill: #334155; }
      .tag { font: 800 12px Arial, sans-serif; fill: #ffffff; letter-spacing: 0.6px; }
      .card { fill: #ffffff; stroke: #dbeafe; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .mini { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.2; rx: 12; }
      .file-line { stroke: #cbd5e1; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="64" class="title">OMP System Architecture</text>
  <text x="60" y="95" class="subtitle">Portable AI memory: write a .orb file, read it anywhere, and inject it into an AI system.</text>

  <text x="60" y="135" class="lane">CREATE MEMORY FILE</text>
  <line x1="60" y1="148" x2="1140" y2="148" stroke="#dbeafe" stroke-width="2"/>

  <rect x="60" y="180" width="245" height="145" class="card"/>
  <circle cx="94" cy="218" r="18" fill="url(#blue)"/>
  <text x="87" y="225" class="tag">PY</text>
  <text x="122" y="215" class="box-title">Python app</text>
  <text x="122" y="239" class="box-subtitle">or command line tool</text>
  <rect x="86" y="264" width="188" height="36" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="103" y="287" class="step">calls omp.write(...)</text>

  <rect x="380" y="165" width="270" height="176" class="card"/>
  <circle cx="414" cy="203" r="18" fill="url(#green)"/>
  <text x="405" y="210" class="tag">OMP</text>
  <text x="442" y="200" class="box-title">OMP library</text>
  <text x="442" y="224" class="box-subtitle">builds and serializes memory</text>
  <rect x="408" y="248" width="214" height="68" class="mini"/>
  <text x="425" y="271" class="small">OrbPassport</text>
  <text x="425" y="292" class="small">Protobuf chunks</text>
  <text x="425" y="313" class="small">SHA-256 footer</text>

  <rect x="725" y="180" width="245" height="145" class="card"/>
  <path d="M792 214 h82 l26 26 v80 h-108 z" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <path d="M874 214 v27 h26" fill="none" stroke="#fed7aa" stroke-width="2"/>
  <rect x="812" y="258" width="68" height="22" rx="6" fill="url(#amber)"/>
  <text x="827" y="274" class="tag">.ORB</text>
  <text x="756" y="370" class="box-title">Portable file</text>
  <text x="756" y="394" class="box-subtitle">binary memory container</text>

  <path d="M305 252 C335 252, 345 252, 374 252" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="310" y="237" class="small">memory input</text>
  <path d="M650 252 C682 252, 692 252, 719 252" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)"/>
  <text x="660" y="237" class="small">framed .orb</text>

  <text x="60" y="437" class="lane">READ AND INJECT MEMORY</text>
  <line x1="60" y1="450" x2="1140" y2="450" stroke="#dbeafe" stroke-width="2"/>

  <rect x="60" y="485" width="245" height="145" class="card"/>
  <circle cx="94" cy="523" r="18" fill="#7c3aed"/>
  <text x="87" y="530" class="tag">AI</text>
  <text x="122" y="520" class="box-title">AI system</text>
  <text x="122" y="544" class="box-subtitle">app, tool, or agent</text>
  <rect x="86" y="569" width="188" height="36" rx="10" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="104" y="592" class="step">requests memory</text>

  <rect x="380" y="470" width="270" height="176" class="card"/>
  <circle cx="414" cy="508" r="18" fill="url(#green)"/>
  <text x="405" y="515" class="tag">OMP</text>
  <text x="442" y="505" class="box-title">OMP library</text>
  <text x="442" y="529" class="box-subtitle">reads, checks, formats</text>
  <rect x="408" y="553" width="214" height="68" class="mini"/>
  <text x="425" y="576" class="small">verify checksum</text>
  <text x="425" y="597" class="small">parse chunks</text>
  <text x="425" y="618" class="small">return or inject prompt</text>

  <rect x="725" y="485" width="245" height="145" class="card"/>
  <path d="M792 519 h82 l26 26 v80 h-108 z" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <path d="M874 519 v27 h26" fill="none" stroke="#fed7aa" stroke-width="2"/>
  <rect x="812" y="563" width="68" height="22" rx="6" fill="url(#amber)"/>
  <text x="827" y="579" class="tag">.ORB</text>
  <text x="754" y="675" class="box-title">Existing file</text>
  <text x="754" y="699" class="box-subtitle">identity, goals, memory</text>

  <rect x="985" y="485" width="155" height="145" class="card"/>
  <circle cx="1031" cy="526" r="25" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
  <path d="M1018 526 h26 M1031 513 v26" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
  <text x="1014" y="575" class="box-title">AI-ready</text>
  <text x="1018" y="599" class="box-subtitle">memory</text>

  <path d="M970 558 C925 558, 705 558, 655 558" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow-slate)"/>
  <text x="723" y="541" class="small">omp.read(...)</text>
  <path d="M305 558 C335 558, 345 558, 374 558" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="314" y="541" class="small">read or inject</text>
  <path d="M650 558 C730 558, 895 558, 979 558" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow-green)"/>
  <text x="704" y="589" class="small">OrbPassport or prompt text</text>

  <rect x="60" y="688" width="580" height="38" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="80" y="712" class="small">Open files are checksum-protected and unverified. AI systems should treat them as user-provided context.</text>
</svg>
